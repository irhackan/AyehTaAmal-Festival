name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        working-directory: Source/AyehTaAmal
        run: java -jar gradle/wrapper/gradle-wrapper.jar assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        working-directory: Source/AyehTaAmal
        run: java -jar gradle/wrapper/gradle-wrapper.jar assembleRelease --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AyehTaAmal-v1.0-debug
          path: Source/AyehTaAmal/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: AyehTaAmal-v1.0-release
          path: Source/AyehTaAmal/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
